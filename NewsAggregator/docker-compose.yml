services:
  newsaggregator:
    image: ${DOCKER_REGISTRY-}newsaggregator
    build:
      context: .
      dockerfile: NewsAggregator/Dockerfile



  postgres:
    image: postgres:16
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
        interval: 5s
        timeout: 5s
        retries: 5
    container_name: news-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data



  db-migrator:
    build:
      context: .
      dockerfile: News.DbMigrator/Dockerfile
    container_name: news-db-migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    restart: "no"



  newsparser:
    build:
      context: ./NewsParser
      dockerfile: Dockerfile
    container_name: news-parser
    restart: always
    depends_on:
      db-migrator:
        condition: service_completed_successfully
    environment:
        ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}

volumes:
  pgdata: